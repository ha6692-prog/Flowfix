databases:
  - name: gigshield-db
    plan: free
    databaseName: gigshield_db
    user: gigshield

services:
  - type: web
    name: gigshield-api
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    preDeployCommand: "python manage.py seed_gigshield --city=Chennai"
    startCommand: "daphne -b 0.0.0.0 -p 10000 gigshield.asgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gigshield-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: SHADOW_MODE
        value: "True"
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://flowfix-six.vercel.app"
